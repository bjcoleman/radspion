name: Redeploy

on:
  workflow_dispatch:

jobs:
  redeploy:
    name: Redeploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy via SSH (jump box)
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          JUMP_HOST: ${{ secrets.DEPLOY_JUMP_HOST }}
          JUMP_USER: ${{ secrets.DEPLOY_JUMP_USER }}
          HOSTNAME: ${{ secrets.DEPLOY_HOST }}
          USER_NAME: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
          ssh -i private_key \
            -o StrictHostKeyChecking=accept-new \
            -J "${JUMP_USER}@${JUMP_HOST}" \
            "${USER_NAME}@${HOSTNAME}" \
            'cd /home/radspion/radspion && ./redeploy.sh'
