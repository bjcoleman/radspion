name: Redeploy

on:
  workflow_dispatch:

jobs:
  redeploy:
    name: Redeploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy via SSH (jump box)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.DEPLOY_JUMP_HOST }}
          proxy_username: ${{ secrets.DEPLOY_JUMP_USER }}
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /home/radspion/radspion
            ./redeploy.sh
