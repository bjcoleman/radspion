<!DOCTYPE html>
<!-- Manual demo for production transmission-modal.js (open in browser). -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transmission modal demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/radspion.css">
  <style>
    .demo {
      max-width: 28rem;
      margin: 3rem auto;
      padding: 0 1rem;
      font-family: var(--font-sans);
      color: var(--color-text);
    }
    .demo h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .demo p { color: var(--color-text-muted); font-size: 0.9375rem; line-height: 1.5; }
    .demo__actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem; }
    .demo__actions button {
      padding: 0.5rem 1rem;
      font: inherit;
      cursor: pointer;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-bg-panel);
      color: var(--color-text);
    }
    .demo__actions button:hover { border-color: var(--color-accent-dim); }
  </style>
</head>
<body class="page page--landing">
  <main class="page__main">
    <div class="demo">
      <h1>Transmission modal</h1>
      <p>
        Exercises <code>static/js/transmission-modal.js</code> (~3s progress with jitter).
        Toggle <strong>Reduce motion</strong> in OS settings to skip the animation.
      </p>
      <div class="demo__actions">
        <button type="button" id="demo-listing-success">Listing data · success (slow POST)</button>
        <button type="button" id="demo-complete-success">Completion data · success</button>
        <button type="button" id="demo-invalid">Invalid data</button>
      </div>
    </div>
  </main>

  <div class="transmission-modal" data-transmission-modal hidden>
    <div class="transmission-modal__backdrop"></div>
    <section class="transmission-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="transmission-heading">
      <div class="transmission-modal__progress" data-transmission-progress>
        <h2 id="transmission-heading" class="transmission-modal__title text-mono" data-transmission-heading>Secure transmission</h2>
        <p class="transmission-modal__step" data-transmission-step aria-live="polite">Initializing secure transmission…</p>
        <div class="transmission-modal__bar" aria-hidden="true">
          <div class="transmission-modal__bar-fill" data-transmission-bar-fill></div>
        </div>
      </div>
      <div class="transmission-modal__outcome" data-transmission-outcome hidden></div>
    </section>
  </div>

  <script src="../../src/radspion/static/js/transmission-modal.js"></script>
  <script src="../../src/radspion/static/js/submit-data.js"></script>
  <script>
    (function () {
      function transmit(request, redirectOnSuccess) {
        window.RadspionTransmission.transmitSerialized({
          request: request,
          renderOutcome: window.RadspionSubmit.renderSubmitOutcome,
          redirectOnSuccess: redirectOnSuccess,
          onSuccess: redirectOnSuccess ? function () { alert("Would redirect to dashboard or mission."); } : undefined,
        });
      }

      document.getElementById("demo-listing-success").addEventListener("click", function () {
        transmit(function () {
          return new Promise(function (r) {
            setTimeout(function () {
              r({
                outcome: "success",
                kind: "unlock",
                new_missions: [{ title: "ES: Gamma", slug: "es-gamma", group_name: "Testing Storyline" }],
              });
            }, 4000);
          });
        }, true);
      });

      document.getElementById("demo-complete-success").addEventListener("click", function () {
        transmit(function () {
          return Promise.resolve({
            outcome: "success",
            kind: "complete",
            mission_slug: "es-beta",
            new_missions: [],
          });
        }, true);
      });

      document.getElementById("demo-invalid").addEventListener("click", function () {
        transmit(function () {
          return Promise.resolve({
            outcome: "invalid",
            message: "We could not validate that data against agency records.",
          });
        }, false);
      });
    })();
  </script>
</body>
</html>
