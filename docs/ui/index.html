<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Radspion — Moravian University field operations platform for authorized agents.">
  <title>Radspion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/radspion.css">
</head>
<body class="page page--landing">
  <main class="page__main">
    <div class="landing">
      <img
        class="landing__mark"
        src="../../logos/radspion_mark_white.svg"
        width="176"
        height="176"
        alt=""
      >
      <h1 class="landing__title">Radspion</h1>
      <p class="landing__codename">Designation RS-01 · Restricted</p>

      <p class="landing__briefing">
        This channel is for <em>authorized field personnel</em> only.<br>
        Identity verification is required.
      </p>

      <section class="access-panel" aria-label="Agent access">
        <p class="access-panel__prompt">Agent Login</p>
        <a href="#" class="btn-google btn-google--agent-login">Secure Login</a>
      </section>
    </div>
  </main>

  <footer class="page__footer site-footer">
    <p class="site-footer__about">
      <a href="about.html">What is Radspion?</a>
    </p>
    <ul class="site-footer__legal">
      <li><a href="privacy.html">Privacy Policy</a></li>
    </ul>
    <p class="site-footer__meta">Moravian University · Educational Use</p>
  </footer>
</body>
</html>
