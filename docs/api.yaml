openapi: 3.0.3
info:
  title: Radspion API
  description: |
    JSON endpoints under `/api/`.

    **Agent vocabulary:** clearance codes are submitted as `clearance_code` on `POST /api/clearance`.
    Mission data is submitted as `completion_code` on `POST /api/missions/{slug}/submit`.
    See `docs/design/06-agent-experience.md`.
  version: 0.1.0
  contact:
    name: Moravian University CS Department

tags:
  - name: Agent
    description: Session cookie required

paths:
  /api/clearance:
    post:
      tags: [Agent]
      summary: Request clearance
      description: |
        Trims leading and trailing whitespace from `clearance_code`. Comparison is case-sensitive.

        Looks up all `mission_clearance_codes` rows with a matching value (the same code may gate
        multiple missions). For each matching mission with `access_rule = clearance_code` that is not
        yet on the agent's list, creates an `active` status row.

        Response shape matches `POST /api/missions/{slug}/submit` — see `MissionListResponse`.
      operationId: grantClearance
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClearanceRequest"
      responses:
        "200":
          description: Clearance request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionListResponse"
              examples:
                success:
                  value:
                    outcome: success
                    new_missions:
                      - title: "ES: Hidden"
                        slug: es-hidden
                        group_name: Testing Storyline
                success_multiple:
                  value:
                    outcome: success
                    new_missions:
                      - title: "ES: Alpha"
                        slug: es-alpha
                        group_name: Testing Storyline
                      - title: "ES: Beta"
                        slug: es-beta
                        group_name: Testing Storyline
                already_done:
                  value:
                    outcome: already_done
                    new_missions: []
                    message: You have already been granted this clearance.
                invalid:
                  value:
                    outcome: invalid
                    message: Command could not verify this clearance code against agency records.
        "400":
          description: Missing or empty `clearance_code`
        "401":
          description: Not signed in

  /api/missions/{slug}/submit:
    post:
      tags: [Agent]
      summary: Submit mission data
      description: |
        Trims leading and trailing whitespace from `completion_code`. Comparison is
        case-sensitive. Internal newlines and spacing must match exactly.

        When `outcome` is `success`, the mission identified by `slug` is marked completed for
        the signed-in agent and listing sync runs. `new_missions` lists missions that became
        available afterward (may be empty).

        Response shape matches `POST /api/clearance` — see `MissionListResponse`.
      operationId: submitMission
      security:
        - sessionCookie: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequest"
      responses:
        "200":
          description: Data submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionListResponse"
              examples:
                success:
                  value:
                    outcome: success
                    new_missions: []
                success_with_listings:
                  value:
                    outcome: success
                    new_missions:
                      - title: "ES: Gamma"
                        slug: es-gamma
                        group_name: Testing Storyline
                already_done:
                  value:
                    outcome: already_done
                    new_missions: []
                    message: This mission is already marked complete.
                invalid:
                  value:
                    outcome: invalid
                    message: We received your transmission, but the recovered data does not match mission parameters.
        "400":
          description: Missing or empty `completion_code`
        "401":
          description: Not signed in
        "404":
          description: Unknown `slug`, or mission not on the agent's mission list

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Signed session cookie

  schemas:
    ClearanceRequest:
      type: object
      required: [clearance_code]
      properties:
        clearance_code:
          type: string
          description: Clearance code

    MissionSummary:
      type: object
      required: [title, slug, group_name]
      properties:
        title:
          type: string
        slug:
          type: string
        group_name:
          type: string

    MissionListResponse:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [success, invalid, already_done]
        message:
          type: string
          description: |
            Optional agent-facing copy for modals. Canonical strings in `docs/design/06-agent-experience.md`.
            Generic on invalid (no answer hints); explains already_done when present.
        new_missions:
          type: array
          items:
            $ref: "#/components/schemas/MissionSummary"
          description: |
            Missions newly added to the agent's list. On clearance success — each matching mission
            that did not yet have a status row (at least one, or outcome is already_done instead).
            On data submit success — missions that became listable after completion sync (may be empty).
            Empty array on already_done.

    SubmitRequest:
      type: object
      required: [completion_code]
      properties:
        completion_code:
          type: string
          description: Mission data (may include newlines)
