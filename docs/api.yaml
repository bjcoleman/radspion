openapi: 3.0.3
info:
  title: Radspion API
  description: JSON endpoints under `/api/`.
  version: 0.1.0
  contact:
    name: Moravian University CS Department

tags:
  - name: Agent
    description: Session cookie required

paths:
  /api/submit:
    post:
      tags: [Agent]
      summary: Submit field data
      description: |
        Trims leading and trailing whitespace from `data`. Comparison is case-sensitive.

        The server resolves `data` as listing data (`mission_unlock_codes`, checked first)
        or completion data (`missions.completion_code` for an active listed mission).
        Listing success lists every matching mission not yet on the agent's dashboard.
        Completion success marks the matching mission complete and runs listing sync.

        Unknown data, completion data for a mission not on the agent's list, and wrong
        data all return `outcome: invalid` with the same message.
      operationId: submitData
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataRequest"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitDataResponse"
              examples:
                list_success:
                  value:
                    outcome: success
                    kind: list
                    new_missions:
                      - title: "ES: Alpha"
                        slug: es-alpha
                        group_name: Testing Storyline
                      - title: "ES: Beta"
                        slug: es-beta
                        group_name: Testing Storyline
                complete_success:
                  value:
                    outcome: success
                    kind: complete
                    mission_slug: es-beta
                    new_missions: []
                complete_success_with_listings:
                  value:
                    outcome: success
                    kind: complete
                    mission_slug: es-alpha
                    new_missions:
                      - title: "ES: Gamma"
                        slug: es-gamma
                        group_name: Testing Storyline
                already_done:
                  value:
                    outcome: already_done
                    new_missions: []
                    message: Those missions are already on your dashboard.
                invalid:
                  value:
                    outcome: invalid
                    message: We could not validate that data against agency records.
        "400":
          description: Missing or empty `data`
        "401":
          description: Not signed in

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Signed session cookie

  schemas:
    DataRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Field data submitted by the agent (listing or completion string).

    MissionSummary:
      type: object
      required: [title, slug, group_name]
      properties:
        title:
          type: string
        slug:
          type: string
        group_name:
          type: string

    SubmitDataResponse:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [success, invalid, already_done]
        message:
          type: string
          description: Optional agent-facing copy. Generic on invalid; explains already_done when present.
        kind:
          type: string
          enum: [list, complete]
          description: Present on success — listing data applied (`list`) or mission marked complete (`complete`).
        mission_slug:
          type: string
          description: Present on complete success — mission marked completed.
        new_missions:
          type: array
          items:
            $ref: "#/components/schemas/MissionSummary"
          description: |
            Missions newly added to the agent's list. On list success — each matching
            mission that did not yet have a status row. On complete success — missions
            that became listable after completion sync (may be empty). Empty array on
            already_done.
