# Radspion — install on webapps as /etc/nginx/conf.d/radspion.conf
#
# Prerequisites:
#   - DNS for radspion.com, www.radspion.com, radspion.org, www.radspion.org → webapps
#   - Let's Encrypt cert (all four names on one certificate):
#       sudo certbot certonly --nginx \
#         -d www.radspion.com -d radspion.com -d radspion.org -d www.radspion.org
#   - gunicorn listening on unix:/run/radspion/gunicorn.sock (see deploy/radspion.service)
#   - www-data in the radspion group (see docs/dev.md)
#
# Canonical site / OAuth: https://www.radspion.com

# Non-canonical hostnames → canonical
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name radspion.com radspion.org www.radspion.org;

    ssl_certificate     /etc/letsencrypt/live/www.radspion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.radspion.com/privkey.pem;

    return 301 https://www.radspion.com$request_uri;
}

# Application (proxied to gunicorn via Unix socket)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.radspion.com;

    ssl_certificate     /etc/letsencrypt/live/www.radspion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.radspion.com/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://unix:/run/radspion/gunicorn.sock:/;
    }
}
